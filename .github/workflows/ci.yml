name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      # actions/checkout v4.2.2, pinned to an immutable revision
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Install elan
        # elan v4.2.3 installer, pinned to an immutable revision
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/b6cec7e10fe4965a605aaf60d1cb4a5837f0462b/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Cache .lake
        # actions/cache v4.2.3, pinned to an immutable revision
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684
        with:
          path: .lake
          key: lake-${{ hashFiles('lean-toolchain', 'lake-manifest.json', 'lakefile.toml') }}

      - name: Get mathlib cache
        run: lake exe cache get

      - name: Run checks
        run: bash scripts/check.sh
